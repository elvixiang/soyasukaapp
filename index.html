function calcVariance(){
  var res=document.getElementById('vr-result'); if(!res||!VAR_CTX) return;
  var sales=[];
  document.querySelectorAll('.vr-inp').forEach(function(inp){
    var n=Number(inp.value)||0; if(!n) return;
    var m=VAR_CTX.menus[Number(inp.dataset.idx)];
    if(m) sales.push({name:m.name,porsi:n,serving:m.serving});
  });
  if(!sales.length){ res.innerHTML='<div class="empty" style="padding:20px"><div class="ei">🔍</div><div>Isi porsi terjual di atas</div></div>'; return; }

  var ex=expectedUsage(VAR_CTX.products,sales);
  // peta harapan pakai nama huruf kecil biar cocok dgn ING MASTER
  var expMap={};
  Object.keys(ex.need).forEach(function(k){ expMap[k.toLowerCase()]={qty:ex.need[k].qty,unit:ex.need[k].unit}; });

  var rows=[], totalRp=0, unitBeda=[], tanpaResep=[];
  VAR_CTX.items.forEach(function(it){
    var e=expMap[it.name.toLowerCase()];
    var expected=e?e.qty:0;
    // Bahan tak tersentuh resep & tak bergerak → tak perlu ditampilkan
    var aktual=it.soAwal+it.masuk-it.soAkhir;
    if(!e && Math.abs(aktual)<0.0001 && !it.waste) return;
    if(!e && expected===0 && aktual>0) tanpaResep.push(it.name);
    if(e && e.unit && it.unit && String(e.unit).trim().toLowerCase()!==String(it.unit).trim().toLowerCase()){
      unitBeda.push(it.name+' (resep: '+e.unit+' vs stok: '+it.unit+')');
    }
    var harusnya=expected+it.waste;
    var vr=aktual-harusnya;
    // Harga ING MASTER = per PACK → per unit dasar = price / fullPax
    var perUnit=(it.fullPax>0&&it.price>0)?(it.price/it.fullPax):0;
    var rp=vr*perUnit;
    totalRp+=rp;
    rows.push({name:it.name,unit:it.unit,soAwal:it.soAwal,masuk:it.masuk,soAkhir:it.soAkhir,
               aktual:aktual,expected:expected,waste:it.waste,harusnya:harusnya,vr:vr,rp:rp,
               pct:harusnya>0?(vr/harusnya*100):0, noPrice:!(perUnit>0)});
  });

  rows.sort(function(a,b){ return b.rp-a.rp; });

  function num(n){ return (Math.round(n*10)/10).toLocaleString('id-ID'); }
  var body=rows.map(function(k){
    var warna=k.vr>0.0001?'var(--red)':(k.vr<-0.0001?'var(--blue)':'var(--brown-soft)');
    var tanda=k.vr>0.0001?'+':'';
    return '<tr>'+
      '<td style="font-weight:600">'+k.name+'<div style="font-size:10.5px;color:var(--brown-soft);font-weight:400">'+num(k.soAwal)+' + '+num(k.masuk)+' − '+num(k.soAkhir)+'</div></td>'+
      '<td style="text-align:right;white-space:nowrap">'+num(k.aktual)+' <span style="font-size:10px;color:var(--brown-soft)">'+k.unit+'</span></td>'+
      '<td style="text-align:right;white-space:nowrap">'+num(k.harusnya)+(k.waste?'<div style="font-size:10px;color:var(--brown-soft)">incl. waste '+num(k.waste)+'</div>':'')+'</td>'+
      '<td style="text-align:right;white-space:nowrap;font-weight:700;color:'+warna+'">'+tanda+num(k.vr)+
        (Math.abs(k.pct)>0.05?'<div style="font-size:10px;font-weight:600">'+tanda+k.pct.toFixed(1)+'%</div>':'')+'</td>'+
      '<td style="text-align:right;white-space:nowrap;font-weight:700;color:'+warna+'">'+(k.noPrice?'<span style="color:var(--orange)">—</span>':tanda+rupiah(k.rp))+'</td>'+
    '</tr>';
  }).join('');

  var notes='';
  if(ex.noRecipe.length) notes+='<div class="est-warn">⚠ Belum ada resep di COGS CALC: <b>'+ex.noRecipe.join(', ')+'</b>. Porsinya tidak ikut dihitung, jadi bahannya terlihat lebih boros dari aslinya.</div>';
  if(ex.noServing.length) notes+='<div class="est-warn">⚠ Serving/porsi belum diisi di RECAP kolom G: <b>'+ex.noServing.join(', ')+'</b>. Porsinya tidak ikut dihitung.</div>';
  if(unitBeda.length) notes+='<div class="est-warn">⚠ <b>Satuan resep beda dengan satuan stok</b>: '+unitBeda.join(', ')+'. Angka variance bahan ini TIDAK bisa dipercaya sampai satuannya disamakan.</div>';
  if(tanpaResep.length) notes+='<div class="est-warn">⚠ Stok berkurang tapi tidak ada di resep mana pun: <b>'+tanpaResep.slice(0,8).join(', ')+(tanpaResep.length>8?', dll':'')+'</b>. Wajar untuk kemasan/sedotan, tapi cek kalau ini bahan utama.</div>';

  res.innerHTML=
    '<div class="card" style="margin-bottom:14px;text-align:center">'+
      '<div class="rk-lbl">Estimasi Nilai Selisih</div>'+
      '<div style="font-size:30px;font-weight:800;line-height:1.3;color:'+(totalRp>0?'var(--red)':'var(--green)')+'">'+(totalRp>0?'':'')+rupiah(totalRp)+'</div>'+
      '<div style="font-size:12px;color:var(--brown-soft);margin-top:2px">'+(totalRp>0?'nilai stok yang tidak bisa dijelaskan':'pemakaian lebih hemat dari resep')+'</div>'+
    '</div>'+notes+
    '<div class="tbl-wrap" style="overflow-x:auto"><table class="tbl" style="min-width:640px"><thead><tr>'+
      '<th>Bahan<div style="font-size:9px;font-weight:400;opacity:.7">awal + masuk − akhir</div></th>'+
      '<th style="text-align:right">Aktual<br><span style="font-size:9px;font-weight:400;opacity:.7">kepakai</span></th>'+
      '<th style="text-align:right">Harusnya<br><span style="font-size:9px;font-weight:400;opacity:.7">resep + waste</span></th>'+
      '<th style="text-align:right">Selisih</th><th style="text-align:right">Nilai</th>'+
    '</tr></thead><tbody>'+body+'</tbody></table></div>'+
    '<div style="font-size:11.5px;color:var(--brown-soft);background:var(--surface2);border-radius:8px;padding:10px 12px;margin-top:12px;line-height:1.55">'+
      '<b style="color:var(--red)">Merah (+)</b> = kepakai lebih banyak dari yang seharusnya → kemungkinan takaran berlebih, tumpah tanpa lapor, atau penjualan tidak masuk kasir.<br>'+
      '<b style="color:var(--blue)">Biru (−)</b> = kepakai lebih sedikit → biasanya salah hitung SO, atau barang masuk belum tercatat di DO.<br>'+
      'Angka ini <b>petunjuk, bukan vonis</b>. Selisih kecil itu normal.'+
    '</div>';
}

var _pdfLoading=null;
function loadPdfLib(){
  var have=(window.jspdf&&window.jspdf.jsPDF)||window.jsPDF;
  if(have) return Promise.resolve(true);
  if(_pdfLoading) return _pdfLoading;
  function inject(src){
    return new Promise(function(res,rej){
      var s=document.createElement('script');
      s.src=src; s.onload=res; s.onerror=function(){rej(new Error('Gagal memuat '+src));};
      document.head.appendChild(s);
    });
  }
  _pdfLoading=inject('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js')
    .then(function(){ return inject('https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js'); })
    .then(function(){ return true; })
    .catch(function(e){ _pdfLoading=null; throw e; });
  return _pdfLoading;
}

  doc.setTextColor(SOFT[0],SOFT[1],SOFT[2]);
  doc.text(isDO?'Admin \u00b7 PT Suka Segar Indonesia':storeFullName(po.store),(133+(W-M))/2,ty+35,{align:'center'});

  doc.setFillColor(ESP[0],ESP[1],ESP[2]); doc.rect(0,291,W,6,'F');
  doc.setFillColor(GOLD[0],GOLD[1],GOLD[2]); doc.rect(0,289.8,W,1.2,'F');
  return doc;
}
function buildPOPdf(po){ return buildDocPdf(po,'PO'); }
function poFileName(po,kind){
  var id=(kind==='DO')?(po.do_id||po.order_id):po.order_id;
  return 'SS_'+String(po.store||'').replace('SOYASUKA_','')+'_'+String(id||'').replace(/[^0-9A-Za-z]/g,'-')+'.pdf';
}
async function downloadDO(i){
  var po=PO_LIST[i]; if(!po) return;
  try{ await loadPdfLib(); buildDocPdf(po,'DO').save(poFileName(po,'DO')); }
  catch(e){ alert('Gagal membuat PDF: '+e.message); }
}
window.downloadDO=downloadDO;
// previewPO dihapus — kolom Preview sudah tidak ada di tabel Incoming PO.
// downloadPO TETAP dipakai (tombol ⬇ PDF di Incoming PO).
async function downloadPO(i){
  var po=PO_LIST[i]; if(!po) return;
  try{ await loadPdfLib(); buildPOPdf(po).save(poFileName(po)); }
  catch(e){ alert('Gagal membuat PDF: '+e.message); }
}
window.downloadPO=downloadPO;

// ========================= NOTIFIKASI PO (lonceng) =========================
var NOTIF={count:0,items:[]};
function canSeePO(){ return ['Owner','Admin'].indexOf(S.user.role)>=0 && canTab('incoming-po'); }
async function refreshNotif(){
  var bell=document.getElementById('bell');
  if(!canSeePO()){ if(bell) bell.style.display='none'; return; }
  if(bell) bell.style.display='';
  try{
    var r=await api({action:'getPONotif',token:S.token});
    if(!r.ok) return;
    NOTIF={count:r.count||0,items:r.items||[]};
    var b=document.getElementById('bell-badge');
    if(b){
      if(NOTIF.count>0){ b.textContent=NOTIF.count>99?'99+':NOTIF.count; b.style.display='flex'; }
      else b.style.display='none';
    }
  }catch(e){}
}
window.refreshNotif=refreshNotif;

function openNotif(){
  var body;
  if(!NOTIF.count){
    body='<div class="empty" style="padding:26px"><div class="ei">🔕</div><div>Tidak ada notifikasi baru</div></div>';
  } else {
    body=NOTIF.items.map(function(n){
      return '<div class="notif-item" onclick="closePopup();navigateTo(\'incoming-po\')">'+
        '<div style="display:flex;justify-content:space-between;gap:8px;align-items:center;margin-bottom:3px">'+
          '<span style="font-weight:700;color:var(--brown-deep);font-size:13.5px">🛒 PO Baru — '+String(n.store).replace('SOYASUKA_','')+'</span>'+
          '<span style="font-size:11px;color:var(--brown-soft);white-space:nowrap">'+(n.created_at||'')+'</span>'+
        '</div>'+
        '<div style="font-size:12.5px;color:var(--brown-soft)">'+n.order_id+' · '+n.count+' item · oleh '+n.display_name+'</div>'+
      '</div>';
    }).join('')+
    '<button class="save-btn" style="width:100%;margin-top:6px" onclick="markAllRead()">✓ Tandai semua sudah dibaca</button>';
  }
  showPopup('Notifikasi'+(NOTIF.count?' ('+NOTIF.count+')':''), body);
}
window.openNotif=openNotif;

async function markAllRead(){
  try{
    await api({action:'markPORead',token:S.token,order_id:'all'});
    await refreshNotif();
    closePopup();
  }catch(e){ alert('Gagal: '+e.message); }
}
window.markAllRead=markAllRead;




function renderCogsRows(){
  var items=window.__cogsItems||[];
  var q=(document.getElementById('cogs-search')&&document.getElementById('cogs-search').value||'').trim().toLowerCase();
  var cat=(document.getElementById('cogs-cat')&&document.getElementById('cogs-cat').value||'');
  var filtered=items.filter(function(r){
    var okQ=!q||String(r[2]).toLowerCase().indexOf(q)>=0;
    var okC=!cat||String(r[1]||'').trim()===cat;
    return okQ&&okC;
  });
  var body=document.getElementById('cogs-body');
  var cnt=document.getElementById('cogs-count');
  if(cnt) cnt.textContent=filtered.length+' dari '+items.length+' menu';
  if(!body)return;
  if(!filtered.length){body.innerHTML='<tr><td colspan="5" style="text-align:center;color:var(--brown-soft);padding:18px">Tidak ada menu yang cocok</td></tr>';return;}
  body.innerHTML=filtered.map(function(r){
    var cogsRaw=r[9]; var cogsPct=typeof cogsRaw==='number'?(cogsRaw<=1&&cogsRaw>0?cogsRaw*100:cogsRaw):parseFloat(String(cogsRaw).replace('%',''))||0;
    var afterRaw=r[11]; var afterPct=typeof afterRaw==='number'?(afterRaw<=1&&afterRaw>0?afterRaw*100:afterRaw):parseFloat(String(afterRaw).replace('%',''))||0;
    var cc=cogsPct>=30?'var(--red)':cogsPct>=20?'var(--gold)':'var(--green)';
    return '<tr><td style="font-weight:600">'+r[2]+'</td><td><span class="tag gold">'+r[1]+'</span></td><td style="text-align:right">'+fmtRp(r[8])+'</td><td style="text-align:right;font-weight:700;color:'+cc+'">'+cogsPct.toFixed(0)+'%</td><td style="text-align:right;font-weight:700;color:'+cc+'">'+(afterPct?afterPct.toFixed(0)+'%':'–')+'</td></tr>';
  }).join('');
}
window.renderCogsRows=renderCogsRows;

</script>
